<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>{% block title %}The Stuffy Council{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%B8%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-amber-50 via-rose-50 to-violet-50 text-slate-800">
    <div class="mx-auto max-w-3xl px-4 py-8">
      {% block header %}{% endblock %}
      <main class="mt-6">
        {% block content %}{% endblock %}
      </main>
      <footer class="mt-16 text-center text-xs text-slate-400">
        <p>The Stuffy Council · a small home for a small circle</p>
      </footer>
    </div>
  </body>
</html>
