<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#fbf8f2" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#211b2e" media="(prefers-color-scheme: dark)" />
    <title>{% block title %}The Stuffy Council{% endblock %}</title>
    <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen">
    <div class="mx-auto max-w-3xl px-4 py-8">
      {% block header %}{% endblock %}
      <main class="mt-6">
        {% block content %}{% endblock %}
      </main>
      <footer class="sc-footer mt-16 text-center text-xs">
        <p>The Stuffy Council · a small home for a small circle</p>
      </footer>
    </div>
  </body>
</html>
