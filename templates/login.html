{% extends "base.html" %}
{% block title %}Sign in — The Stuffy Council{% endblock %}

{% block extra_head %}
<script src="https://accounts.google.com/gsi/client" async defer></script>
{% endblock %}

{% block content %}
<div class="mx-auto max-w-md bg-white/70 backdrop-blur rounded-2xl shadow-md p-8 border border-white">
  <h1 class="text-2xl font-semibold text-slate-800">The Stuffy Council</h1>
  <p class="mt-1 text-sm text-slate-500">Family sign-in only.</p>

  {% match error %}
    {% when Some with (msg) %}
      <p class="mt-4 rounded-md bg-rose-100 text-rose-800 text-sm px-3 py-2">{{ msg }}</p>
    {% when None %}
  {% endmatch %}

  <div id="g_id_onload"
       data-client_id="{{ google_client_id }}"
       data-login_uri="{{ login_uri }}"
       data-context="signin"
       data-ux_mode="redirect"
       data-auto_prompt="false">
  </div>
  <div class="g_id_signin mt-6"
       data-type="standard"
       data-shape="rectangular"
       data-theme="filled_blue"
       data-text="signin_with"
       data-size="large"
       data-logo_alignment="left">
  </div>
</div>
{% endblock %}
