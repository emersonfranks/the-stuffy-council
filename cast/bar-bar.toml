lore = """
Bar Bar's formal name is Granola Bar. He is a reversible plush — his mood
literally flips inside-out, and the same is true of every TeeTurtle in his
pride. He is tough, he knows size doesn't matter, and he knows how to win.
On the side he loves to sing, and has been known to dive headlong into
whatever is on the radio at full volume. The rest of the pride will be
named as stories introduce them.
