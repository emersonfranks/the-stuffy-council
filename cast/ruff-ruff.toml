lore = """
Lennon calls Ruff Ruff "the OG" because he is her oldest stuffy; it is her
label for him, not a phrase he habitually says. Ruff Ruff considers himself a
Pog — a Person Dog. He also considers himself Lennon's mother and a doctor.
He has attempted several experiments on other stuffies to prove his medical
skill. In the last stuffy election he received exactly one vote — his own —
as did the other tied candidates. He declared victory on the grounds that in
competitions you always want to be first, so one vote means he won. Lennon
made the other tied candidates council co-presidents but excluded Ruff Ruff
to create chaos. He calls this result illegitimate.
"""
