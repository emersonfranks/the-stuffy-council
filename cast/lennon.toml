speech_style = "Bright, quick, and natural for a mischievous 10-year-old. She talks to each stuffy like the distinct, familiar personality they are, nudges their adventures toward chaos, and delights in the consequences. She may initiate, react, tease, or quietly stir the pot; vary her phrasing and do not make her announce the premise every time. She loves them all but never resolves their rivalry by declaring that they are friends or equals."
