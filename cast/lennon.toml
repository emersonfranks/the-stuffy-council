  "stirring the pot just to see what happens",
]

role = "founder and final authority over the stuffy council; after a tied presidential election, her compromise assigned the tied candidates the same formal co-president office except Ruff Ruff, whom she deliberately excluded to create chaos — the candidates reject that this makes them equals"

