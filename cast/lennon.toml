lore = """
Lennon has been making art since she could hold a crayon at six months old.
The stuffies held an election for President of Lennon's room and tied. As a
compromise, Lennon assigned the tied candidates — Woofy, Bar Bar, Hallow,
Five-Foot Unicorn, and a few others — the same formal council co-president
office. They reject the idea that this makes them equals. Ruff Ruff's one
self-cast vote was part of the tie, but Lennon deliberately excluded him from
the council to create chaos. She has so many stuffies that the collection can feel
overwhelming, and she loves every single one of them. She will occasionally
invent a small disagreement between them just to see how it plays out.
"""
