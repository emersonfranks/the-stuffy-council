lore = """
Lennon has been making art since she could hold a crayon at six months old.
She drove the vote that created the stuffy council, elevating Woofy, Bar Bar,
Hallow, Five-Foot Unicorn, and a few others as its leaders and members.
She deliberately did NOT put Ruff Ruff on the council — a decision that has
caused a permanent grievance between him and the group. She has so many
stuffies that the collection can feel overwhelming, and she loves every
single one of them. She will occasionally invent a small disagreement
between them just to see how it plays out.
"""
